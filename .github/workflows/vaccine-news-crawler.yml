name: Vaccine News Crawler

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours — 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:         # Manual trigger from the Actions tab
  push:
    branches:
      - main
    paths:
      - '.github/workflows/vaccine-news-crawler.yml'
      - 'crawler/**'

jobs:
  crawl:
    name: Crawl & Queue News
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install crawler dependencies
        working-directory: crawler
        run: npm install

      - name: Run vaccine news crawler
        working-directory: crawler
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # Optional — set either to enable AI-powered summaries (no code changes needed)
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: npx ts-node index.ts
