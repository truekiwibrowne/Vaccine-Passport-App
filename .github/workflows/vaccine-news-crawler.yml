name: Vaccine News Crawler

# ── Schedule ──────────────────────────────────────────────────────────────────
# Runs every 6 hours.  Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:         # Manual "Run workflow" button in GitHub Actions UI

jobs:
  crawl:
    name: Crawl & Queue News
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crawler/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install crawler dependencies
        working-directory: crawler
        run: npm install

      # ── 4. Run crawler ────────────────────────────────────────────────────
      - name: Run vaccine news crawler
        working-directory: crawler
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npx ts-node index.ts
