name: Vaccine News Crawler

# Runs every 6 hours. Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  crawl:
    name: Crawl & Queue News
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crawler/package-lock.json

      - name: Install crawler dependencies
        working-directory: crawler
        run: npm install

      - name: Run vaccine news crawler
        working-directory: crawler
        env:
          # Required
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # Optional — add either key later to enable AI-powered summaries
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: npx ts-node index.ts
